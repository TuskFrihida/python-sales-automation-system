<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Analytics Dashboard</title>
    <style>
        body { font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
               background: #f4f6f9; color: #1f2933; display: flex; min-height: 100vh;
               align-items: center; justify-content: center; margin: 0; }
        .box { background: #fff; padding: 40px 48px; border-radius: 12px; text-align: center;
               box-shadow: 0 1px 4px rgba(0,0,0,.1); max-width: 480px; }
        h1 { color: #2E86AB; margin-top: 0; }
        code { background: #eef1f4; padding: 2px 8px; border-radius: 6px; }
        form { margin-top: 20px; }
        button { border: none; cursor: pointer; padding: 12px 20px; border-radius: 8px;
                 color: #fff; background: #2E86AB; font-size: 14px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>No data yet</h1>
        <p>There are no sales data files to report on.</p>
        <p>Generate sample data from the command line with<br><code>python main.py generate-data</code><br>or use the button below.</p>
        <form action="{{ url_for('regenerate') }}" method="post">
            <button type="submit">Generate Sample Data</button>
        </form>
    </div>
</body>
</html>
